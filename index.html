<!DOCTYPE html>
<html>
<head>
    <title>Protected Iframe</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #iframeContainer {
            display: block; /* Changed from none to block */
            position: relative;
            text-align: center;
        }

        iframe {
            width: 1200px;
            height: 800px;
            border: none;
            border-radius: 10px;
            background: black;
        }

        #fullscreenBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="iframeContainer">
    <button id="fullscreenBtn" onclick="goFullscreen()">Fullscreen</button>

    <iframe 
        id="gameFrame"
        src="https://browser.lol/viewer"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen; gamepad"
        allowfullscreen>
    </iframe>
</div>
   
<script>
    function goFullscreen() {
        const iframe = document.getElementById("gameFrame");

        if (iframe.requestFullscreen) {
            iframe.requestFullscreen();
        } else if (iframe.webkitRequestFullscreen) { // Safari
            iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) { // IE11
            iframe.msRequestFullscreen();
        }
    }
</script>

</body>
</html>
