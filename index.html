<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Browser VM</title>

<script src="https://cdn.jsdelivr.net/gh/copy/v86@master/build/libv86.js"></script>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#screen_container{
width:1024px;
height:768px;
border:2px solid white;
}
</style>
</head>

<body>

<div id="screen_container"></div>

<script>

const emulator = new V86({

screen_container: document.getElementById("screen_container"),

bios: {
url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/seabios.bin"
},

vga_bios: {
url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/vgabios.bin"
},

fda: {
url: "https://cdn.jsdelivr.net/gh/copy/v86@master/images/freedos722.img"
},

memory_size: 64 * 1024 * 1024,
vga_memory_size: 8 * 1024 * 1024,

autostart: true

});

</script>

</body>
</html>
